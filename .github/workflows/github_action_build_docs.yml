# Build and publish the fork documentation site to GitHub Pages.

name: documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "evennia/**"
      - ".github/workflows/github_action_build_docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "evennia/**"
      - ".github/workflows/github_action_build_docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EVGAMEDIR: ${{ github.workspace }}/../gamedir

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install doc-building dependencies
        run: |
          python -m pip install --upgrade pip
          cd docs
          make install

      - name: Install Evennia
        run: |
          python -m pip install .
          python -m pip install .[extra]

      - name: Set up Evennia game dir
        run: |
          cd "$GITHUB_WORKSPACE/.."
          evennia --init gamedir
          cd "$EVGAMEDIR"
          evennia migrate

      - name: Build docs
        run: |
          cd docs
          make local

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
